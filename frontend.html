<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>BioHacker System - Ingreso de Datos</title>
</head>
<body style="font-family: Arial, sans-serif; padding: 20px;">

    <h2>Registro Diario (BioHacker System)</h2>
    
    <form action="http://localhost:5000/guardar_registro" method="POST">
        
        <label>Horas de Sueño:</label><br>
        <input type="number" step="0.1" name="horas_sueno" required><br><br>

        <label>Nivel de Estrés (1-10):</label><br>
        <input type="number" min="1" max="10" name="nivel_estres" required><br><br>

        <label>Fecha:</label><br>
        <input type="date" name="fecha" required><br><br>

        <input type="submit" value="Guardar en Base de Datos">
    </form>

</body>
</html>
